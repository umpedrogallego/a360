<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFÓLIO | PEDRO GALLEGO</title>

    <!-- Fonte: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #3a3d3a;
            --text-color: #c8d0c8;
            --brand-color: #79e279;
            --border-color: #555855;
            --font-family: 'Plus Jakarta Sans', sans-serif;
            --nav-bg: #1b1c1b;
            --nav-hover: #2d302d;
            --nav-border: #333633;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            width: 100%; 
            max-width: none;
            padding-bottom: 150px; /* Respiro extra para o nav fixo */
            padding-top: 50px; 
        }

        /* --- CABEÇALHO --- */
        .top-header {
            width: 90%;
            margin: 0 auto 100px auto; /* Afasta o cabeçalho do conteúdo */
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .top-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--brand-color); /* Mantém o peso e a cor da marca */
            margin: 0;
            letter-spacing: 2px;
            line-height: 1;
        }

        /* --- GRID EDITORIAL ASSIMÉTRICO --- */
        .editorial-gallery {
            width: 90%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .portfolio-item {
            display: block;
            text-decoration: none;
            color: var(--text-color);
            margin-bottom: 120px; /* Grande respiro vertical entre obras */
        }

        /* Ritmo do Layout: Cada item ocupa um espaço diferente na tela */
        .portfolio-item:nth-child(1) { width: 75%; margin-left: 0; }
        .portfolio-item:nth-child(2) { width: 65%; margin-left: auto; }
        .portfolio-item:nth-child(3) { width: 85%; margin: 0 auto; }
        .portfolio-item:nth-child(4) { width: 70%; margin-left: 5%; }

        /* Estrutura da Imagem com efeito Parallax/Scale */
        .image-wrapper {
            width: 100%;
            overflow: hidden;
            background-color: #222; /* Placeholder enquanto carrega */
        }

        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            transform: scale(1.01);
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .portfolio-item:hover .image-wrapper img {
            transform: scale(1.04);
        }

        /* Ficha Técnica Minimalista (Abaixo da imagem) */
        .project-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            transition: opacity 0.3s ease;
        }

        .portfolio-item:hover .project-meta {
            opacity: 0.8;
        }

        .project-number {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--brand-color);
            letter-spacing: 1px;
        }

        .project-title {
            font-size: 2.2rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.1;
            text-align: right;
            max-width: 70%;
        }


        /* --- MENU INFERIOR FIXO --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4%;
            box-sizing: border-box;
            z-index: 900;
            font-size: 0.8rem;
            border-top: 1px solid var(--nav-border);
        }

        .bottom-nav a {
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            display: inline-block;
            border-radius: 4px;
        }

        .nav-left a {
            font-weight: 700;
            color: #e0e5e0;
            padding: 8px 12px;
        }

        .nav-left a:hover {
            background-color: var(--nav-hover);
            color: #fff;
        }

        .nav-right {
            display: flex;
            align-items: center;
        }

        .nav-right a {
            font-weight: 400;
            color: #939b93;
            padding: 8px 16px;
            border-left: 1px solid var(--nav-border);
            border-radius: 0;
        }
        
        .nav-right a:first-child {
            border-left: none;
        }

        .nav-right a:hover {
            background-color: var(--nav-hover);
            color: #fff;
            border-radius: 4px;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 900px) {
            .bottom-nav {
                flex-direction: column;
                gap: 5px;
                padding: 12px 2%;
            }
            .nav-right {
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-right a {
                border-left: none;
                padding: 6px 10px;
            }
            
            /* Normaliza o ritmo do grid para telas médias */
            .portfolio-item:nth-child(n) { 
                width: 100%; 
                margin-left: 0; 
                margin-bottom: 80px; 
            }
        }

        @media (max-width: 768px) {
            .top-header {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 60px;
            }
            .top-header h1 {
                font-size: 2rem;
            }
            .project-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Cabeçalho Principal -->
        <header class="top-header">
            <h1>PORTFÓLIO</h1>
            <h1>PEDRO GALLEGO</h1>
        </header>

        <!-- Galeria Editorial -->
        <main class="editorial-gallery">
            
            <!-- Projeto 01 -->
            <a href="https://umpedrogallego.github.io/a360/acapulco.html" class="portfolio-item">
                <div class="image-wrapper">
                    <img src="https://umpedrogallego.github.io/a360/img/ACAPULCO_still1.jpg" alt="Acapulco">
                </div>
                <div class="project-meta">
                    <div class="project-number">01</div>
                    <div class="project-title">ACAPULCO</div>
                </div>
            </a>

            <!-- Projeto 02 -->
            <a href="https://umpedrogallego.github.io/a360/vev.html" class="portfolio-item">
                <div class="image-wrapper">
                    <img src="https://umpedrogallego.github.io/a360/img/vev1.jpg" alt="Vai e Vem">
                </div>
                <div class="project-meta">
                    <div class="project-number">02</div>
                    <div class="project-title">VAI E VEM</div>
                </div>
            </a>

            <!-- Projeto 03 -->
            <a href="https://umpedrogallego.github.io/a360/osalto.html" class="portfolio-item">
                <div class="image-wrapper">
                    <img src="https://umpedrogallego.github.io/a360/img/osalto1.jpg" alt="O Salto">
                </div>
                <div class="project-meta">
                    <div class="project-number">03</div>
                    <div class="project-title">O SALTO</div>
                </div>
            </a>

            <!-- Projeto 04 -->
            <a href="https://umpedrogallego.github.io/a360/fmf.html" class="portfolio-item">
                <div class="image-wrapper">
                    <img src="https://umpedrogallego.github.io/a360/img/fmf2.jpg" alt="Futuro Movimento Futuro: Reprovado">
                </div>
                <div class="project-meta">
                    <div class="project-number">04</div>
                    <div class="project-title">FUTURO MOVIMENTO FUTURO:<br>REPROVADO</div>
                </div>
            </a>

        </main>
    </div>

    <!-- Menu Rodapé -->
    <nav class="bottom-nav">
        <div class="nav-left">
            <a href="https://umpedrogallego.github.io/a360/index.html">PORTFÓLIO | PEDRO GALLEGO</a>
        </div>
        <div class="nav-right">
            <a href="https://umpedrogallego.github.io/a360/acapulco.html">ACAPULCO</a>
            <a href="https://umpedrogallego.github.io/a360/vev.html">VAI E VEM</a>
            <a href="https://umpedrogallego.github.io/a360/osalto.html">O SALTO</a>
            <a href="https://umpedrogallego.github.io/a360/fmf.html">FUTURO MOVIMENTO FUTURO: REPROVADO</a>
        </div>
    </nav>

</body>
</html>
